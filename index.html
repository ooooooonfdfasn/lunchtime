<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>점심시간 - 익명 점심 대화 프로토타입</title>
    <meta
      name="description"
      content="직장인이 점심시간에 랜덤 익명으로 대화하고 함께 먹을 사람을 찾는 소통 프로토타입"
    />
    <style>
      :root {
        color-scheme: light;
        --sheet-bg: #ffffff;
        --header-bg: #f4f6f8;
        --panel-bg: #ffffff;
        --ink: #111111;
        --muted: #565f6b;
        --grid: #e8e8e8;
        --header-line: #d6d6d6;
        --accent: #0f9d59;
        --accent-dark: #0b7f46;
        --button-divider: rgba(255, 255, 255, 0.9);
        --strong: var(--accent);
        --select: var(--accent);
        --col-w: 101px;
        --col-head-h: 28px;
        --sheet-row-count: 37;
        --viewport-h: 100svh;
        --row-h: calc((var(--viewport-h) - var(--col-head-h)) / var(--sheet-row-count));
      }

      @supports (height: 100dvh) {
        :root {
          --viewport-h: 100dvh;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--sheet-bg);
      }

      body {
        height: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--sheet-bg);
        color: var(--ink);
        font-family:
          Arial,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .screen {
        height: var(--viewport-h);
        min-height: 0;
        width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        background: var(--sheet-bg);
      }

      .sheet-grid {
        display: grid;
        grid-template-columns: repeat(12, var(--col-w));
        grid-template-rows: repeat(2, var(--row-h)) var(--col-head-h) repeat(35, var(--row-h));
        height: 100%;
        width: calc(var(--col-w) * 12);
        min-height: 0;
        background: var(--sheet-bg);
        color: var(--ink);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .col-head {
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--header-line);
        border-bottom: 1px solid var(--header-line);
        background: var(--header-bg);
        color: var(--ink);
        font-size: 12px;
        line-height: 1;
        user-select: none;
      }

      .col-head {
        position: sticky;
        top: 0;
        z-index: 6;
        grid-row: 3;
      }

      .cell-layer,
      .overlay-layer {
        display: contents;
      }

      .title-cell {
        z-index: 8;
        grid-column: 1 / -1;
        grid-row: 1 / 3;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-width: 0;
        min-height: 0;
        margin: 0;
        padding: 4px 8px;
        background: var(--accent);
        color: #ffffff;
        font-size: min(30px, calc(var(--row-h) * 1.45));
        font-weight: 800;
        line-height: 1.1;
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .sheet-cell {
        min-width: 0;
        min-height: 0;
        border: 0;
        border-right: 1px solid var(--grid);
        border-bottom: 1px solid var(--grid);
        background: var(--sheet-bg);
        pointer-events: none;
        user-select: none;
      }

      .merged,
      .panel,
      .sheet-button,
      .chat-input {
        border: 0;
        background: var(--panel-bg);
        color: var(--ink);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .merged,
      .panel {
        z-index: 3;
        pointer-events: auto;
      }

      .banner-cell {
        grid-column: 1 / 12;
        grid-row: 4 / 5;
        overflow: hidden;
        white-space: nowrap;
      }

      .banner-track {
        display: inline-flex;
        align-items: center;
        min-width: max-content;
        height: 100%;
        animation: marquee 72s linear infinite;
        will-change: transform;
      }

      .banner-track span {
        padding-right: 72px;
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes marquee {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(-100%);
        }
      }

      .option-panel {
        position: relative;
        z-index: 5;
        grid-column: 8 / 9;
        grid-row: 7 / 8;
      }

      .time-panel {
        z-index: 3;
        grid-column: 5 / 7;
        grid-row: 7 / 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 6px;
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .clock {
        font-size: min(31px, calc(var(--row-h) * 1.5));
        font-weight: 700;
        line-height: 1.1;
        text-align: center;
      }

      .quote-panel {
        z-index: 3;
        grid-column: 1 / -1;
        grid-row: 12 / 15;
        display: grid;
        grid-template-rows: repeat(3, var(--row-h));
        align-content: start;
        gap: 0;
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .quote-panel p {
        display: grid;
        grid-template-columns: var(--col-w) minmax(0, 1fr);
        align-items: stretch;
        height: var(--row-h);
        min-height: 0;
        margin: 0;
        padding: 0;
        border-bottom: 1px solid var(--grid);
        font-size: 13px;
        line-height: var(--row-h);
        text-align: left;
      }

      .quote-label,
      .quote-text {
        display: flex;
        align-items: center;
        min-width: 0;
        height: 100%;
        padding: 0 6px;
        overflow: hidden;
        white-space: nowrap;
      }

      .quote-label {
        border-right: 1px solid var(--strong);
        font-weight: 700;
      }

      .quote-text {
        text-overflow: ellipsis;
      }

      .quote-panel p:last-child {
        border-bottom: 0;
      }

      .sponsor-button {
        z-index: 3;
        grid-column: 5 / 7;
        grid-row: 10 / 11;
      }

      .chat-panel {
        z-index: 3;
        grid-column: 4 / 9;
        grid-row: 34 / 36;
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--col-w);
        grid-template-rows: calc(var(--row-h) * 2);
        align-content: end;
        background: var(--panel-bg);
        pointer-events: auto;
      }

      .chat-panel.has-visible-messages {
        grid-row: 30 / 36;
        grid-template-rows: min-content calc(var(--row-h) * 2);
      }

      .chat-dock {
        display: none;
        grid-column: 1 / -1;
        margin-bottom: -1px;
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .chat-panel.is-open {
        grid-row: 29 / 36;
        grid-template-rows: min-content calc(var(--row-h) * 2);
      }

      .chat-panel.is-open .chat-dock {
        display: block;
      }

      .chat-panel.has-visible-messages .chat-dock {
        display: block;
      }

      .chat-panel:not(.is-open) .chat-form {
        display: none;
      }

      .message-feed {
        display: grid;
        align-content: start;
        max-height: 0;
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        border-bottom: 0;
      }

      .message-feed.has-messages {
        max-height: calc(var(--row-h) * 4);
        border-bottom: 1px solid var(--grid);
      }

      .message-feed p {
        display: block;
        height: var(--row-h);
        min-height: 0;
        margin: 0;
        padding: 0 6px;
        border-bottom: 1px solid var(--grid);
        background: var(--panel-bg);
        color: #111111 !important;
        -webkit-text-fill-color: #111111 !important;
        font-size: 13px;
        font-weight: 700;
        line-height: var(--row-h);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        transition:
          opacity 700ms ease,
          transform 700ms ease;
      }

      .message-feed p:last-child {
        border-bottom: 0;
      }

      .message-feed span {
        margin-right: 6px;
        color: var(--muted);
        -webkit-text-fill-color: var(--muted);
        font-weight: 700;
      }

      .message-feed .message-text {
        min-width: 0;
        margin-right: 0;
        overflow: hidden;
        color: #111111 !important;
        -webkit-text-fill-color: #111111 !important;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .message-feed p.is-fading {
        opacity: 0;
        transform: translateY(-2px);
      }

      .chat-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--col-w);
        height: calc(var(--row-h) * 2);
      }

      .chat-input {
        width: 100%;
        height: calc(var(--row-h) * 2);
        padding: 0 6px;
        border-radius: 0;
        background: var(--panel-bg);
        color: #111111;
        -webkit-text-fill-color: #111111;
        font-size: 16px;
        outline: 0;
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .chat-input::placeholder {
        color: var(--muted);
        opacity: 1;
      }

      .chat-open-button {
        grid-column: 1 / -1;
        height: calc(var(--row-h) * 2);
        font-size: 16px;
        box-shadow:
          inset 0 1px 0 var(--button-divider),
          inset 0 0 0 1px var(--strong);
      }

      .notice-panel {
        grid-column: 1 / -1;
        grid-row: 37 / 39;
        display: grid;
        grid-template-columns: var(--col-w) minmax(0, 1fr);
        align-items: center;
        overflow: hidden;
        padding: 0;
        font-size: 13px;
        text-align: center;
      }

      .notice-label {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        height: 100%;
        min-width: 0;
        padding: 0 6px;
        border-right: 1px solid var(--strong);
        font-weight: 700;
      }

      .notice-text {
        display: flex;
        align-items: center;
        min-width: 0;
        height: 100%;
        padding: 0 6px;
        overflow: hidden;
        color: var(--ink);
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .panel-row {
        display: flex;
        align-items: center;
        min-width: 0;
        min-height: var(--row-h);
        padding: 0 4px;
        border-bottom: 1px solid var(--strong);
        font-size: 13px;
        line-height: 1;
        text-align: left;
      }

      .panel-row:last-child {
        border-bottom: 0;
      }

      .sheet-button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-width: 0;
        height: 100%;
        min-height: var(--row-h);
        padding: 0 4px;
        border-radius: 0;
        background: var(--accent);
        color: #ffffff;
        box-shadow: inset 0 0 0 1px var(--strong);
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
      }

      .option-back-cell {
        z-index: 3;
        grid-column: 1 / 2;
        grid-row: 4 / 5;
      }

      .option-page-panel {
        z-index: 3;
        grid-column: 1 / 7;
        grid-row: 6 / 10;
        display: grid;
        grid-template-rows: repeat(4, var(--row-h));
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .option-setting-row {
        display: grid;
        grid-template-columns: calc(var(--col-w) * 2) minmax(0, 1fr);
        min-height: var(--row-h);
        border-bottom: 1px solid var(--grid);
      }

      .option-setting-row:last-child {
        border-bottom: 0;
      }

      .option-setting-label,
      .option-setting-control {
        display: flex;
        align-items: center;
        min-width: 0;
        height: var(--row-h);
        padding: 0 6px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
      }

      .option-setting-label {
        border-right: 1px solid var(--strong);
      }

      .option-setting-control {
        padding: 0;
      }

      .option-setting-control .sheet-button {
        height: var(--row-h);
      }

      .sheet-button:hover,
      .sheet-button:focus-visible {
        outline: 2px solid var(--select);
        outline-offset: -2px;
        filter: brightness(0.94);
      }

      .sheet-button.is-active {
        background: var(--accent-dark);
        color: #ffffff;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        max-width: min(360px, calc(100% - 36px));
        min-height: var(--row-h);
        padding: 6px 8px;
        border: 1px solid var(--strong);
        background: var(--panel-bg);
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
      }

      .toast[hidden] {
        display: none;
      }

      @media (max-width: 760px) {
        :root {
          --col-w: calc(100vw / 6);
          --col-head-h: 30px;
        }

        .screen {
          height: var(--viewport-h);
          min-height: 0;
          overflow-x: hidden;
          overflow-y: hidden;
        }

        .title-cell {
          grid-column: 1 / 7;
        }

        .banner-cell {
          grid-column: 1 / -1;
        }

        .time-panel {
          grid-column: 2 / 6;
          grid-row: 6 / 8;
        }

        .option-panel {
          grid-column: 5 / 6;
          grid-row: 8 / 9;
        }

        .sponsor-button {
          grid-column: 2 / 5;
          grid-row: 8 / 9;
        }

        .quote-panel {
          grid-column: 1 / 7;
          grid-row: 10 / 13;
        }

        .chat-panel {
          grid-column: 1 / 7;
        }

        .chat-panel.has-visible-messages {
          grid-row: 30 / 36;
        }

        .chat-panel.is-open {
          grid-row: 29 / 36;
        }

        .is-chat-focused .chat-panel.is-open {
          grid-row: 25 / 36;
        }

        .notice-panel {
          grid-column: 1 / 7;
        }

        .is-chat-focused .notice-panel {
          grid-row: 37 / 39;
        }

        .is-chat-focused .message-feed.has-messages {
          max-height: calc(var(--row-h) * 8);
        }

        .option-toggle {
          box-shadow:
            inset 1px 0 0 var(--button-divider),
            inset 0 0 0 1px var(--strong);
        }

        .banner-track span,
        .panel-row,
        .quote-panel p,
        .sheet-button {
          font-size: 12px;
        }

        .clock {
          font-size: 24px;
          line-height: 1;
        }

        .quote-label {
          font-size: 11px;
        }

        .toast {
          right: 12px;
          bottom: 12px;
          max-width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <main class="screen" id="mainScreen">
      <section class="sheet-grid" aria-label="점심시간 스프레드시트 화면">
        <h1 class="title-cell">점심시간</h1>
        <div class="cell-layer" id="cellLayer" aria-hidden="true"></div>
        <div class="overlay-layer">
          <section class="merged banner-cell" aria-label="상단 정보 배너">
            <div class="banner-track">
              <span>날씨: 서울 구름 조금 25도, 강수 확률 10%</span>
              <span>뉴스: 점심시간 랜덤 대화방 베타 테스트 진행 중</span>
              <span>경제: 코스피 보합권 출발, 환율은 소폭 하락</span>
              <span>생활: 오늘의 추천 메뉴는 냉모밀, 돈가스, 제육</span>
              <span>스포츠: 저녁 7시 야구 경기 주요 매치업 안내</span>
              <span>주식: 관심 종목 알림은 점심 이후 업데이트</span>
            </div>
          </section>

          <section class="time-panel" aria-label="현재 시간">
            <div class="clock" id="clock">9:31</div>
          </section>

          <section class="option-panel" aria-label="옵션">
            <button
              type="button"
              class="sheet-button option-toggle"
              id="optionToggle"
              aria-controls="optionScreen"
            >
              옵션
            </button>
          </section>

          <button type="button" class="sheet-button sponsor-button" id="sponsorButton">후원하기</button>

          <section class="quote-panel" aria-label="오늘의 문장">
            <p><span class="quote-label">오늘의 문장</span><span class="quote-text">점심은 작은 리셋 버튼이다.</span></p>
            <p><span class="quote-label">랜덤 익명</span><span class="quote-text">오늘 처음 말해도 괜찮은 사람들.</span></p>
            <p><span class="quote-label">메뉴 후보</span><span class="quote-text">냉모밀 / 제육 / 샐러드 / 돈가스</span></p>
          </section>

          <section class="chat-panel" id="chatPanel" aria-label="채팅">
            <div class="chat-dock" id="chatDock">
              <div class="message-feed" id="messageFeed" aria-live="polite"></div>
              <form class="chat-form" id="chatForm">
                <input
                  class="chat-input"
                  id="chatInput"
                  maxlength="120"
                  autocomplete="off"
                  enterkeyhint="enter"
                  placeholder="채팅 입력"
                />
                <button type="button" class="sheet-button" id="chatSendButton">전송</button>
              </form>
            </div>
            <button type="button" class="sheet-button chat-open-button" id="chatOpenButton">
              채팅 말하기
            </button>
          </section>

          <footer class="merged notice-panel" aria-label="공지">
            <strong class="notice-label">공지</strong>
            <span class="notice-text">...</span>
          </footer>
        </div>
      </section>
    </main>

    <main class="screen option-screen" id="optionScreen" hidden>
      <section class="sheet-grid option-grid" aria-label="옵션 화면">
        <h1 class="title-cell">옵션</h1>
        <div class="cell-layer" id="optionCellLayer" aria-hidden="true"></div>
        <div class="overlay-layer">
          <div class="option-back-cell">
            <button type="button" class="sheet-button" id="backToMainButton">뒤로</button>
          </div>

          <section class="option-page-panel" aria-label="옵션 설정">
            <div class="option-setting-row">
              <span class="option-setting-label">시간 표시</span>
              <div class="option-setting-control">
                <button type="button" class="sheet-button" id="timeModeToggle">24시간</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" hidden></div>

    <script>
      const stateKey = "lunchtime-sheet-state";
      const columns = "ABCDEFGHIJKL".split("");
      const rowCount = 35;
      const messageVisibleMs = 10 * 1000;
      const messageFadeMs = 700;

      const mainScreen = document.querySelector("#mainScreen");
      const optionScreen = document.querySelector("#optionScreen");
      const cellLayer = document.querySelector("#cellLayer");
      const optionCellLayer = document.querySelector("#optionCellLayer");
      const clock = document.querySelector("#clock");
      const optionToggle = document.querySelector("#optionToggle");
      const backToMainButton = document.querySelector("#backToMainButton");
      const timeModeToggle = document.querySelector("#timeModeToggle");
      const sponsorButton = document.querySelector("#sponsorButton");
      const chatPanel = document.querySelector("#chatPanel");
      const chatOpenButton = document.querySelector("#chatOpenButton");
      const chatInput = document.querySelector("#chatInput");
      const chatForm = document.querySelector("#chatForm");
      const chatSendButton = document.querySelector("#chatSendButton");
      const messageFeed = document.querySelector("#messageFeed");
      const toast = document.querySelector("#toast");

      const state = loadState();
      let messages = [];
      let timeMode = state.timeMode;
      let toastTimer = null;
      const messageTimers = new Map();
      let keepChatOpenUntil = 0;

      function getActiveScreen() {
        return document.querySelector(".screen:not([hidden])") || mainScreen;
      }

      function lockPageScroll({ resetX = false } = {}) {
        mainScreen.scrollTop = 0;
        optionScreen.scrollTop = 0;
        document.scrollingElement.scrollTop = 0;
        document.body.scrollTop = 0;
        window.scrollTo(0, 0);

        if (resetX) {
          mainScreen.scrollLeft = 0;
          optionScreen.scrollLeft = 0;
        }
      }

      function syncViewportHeight() {
        const viewportHeight = window.visualViewport?.height || window.innerHeight;
        if (viewportHeight > 0) {
          document.documentElement.style.setProperty("--viewport-h", `${viewportHeight}px`);
        }
        lockPageScroll();
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(stateKey) || "{}");
          return {
            timeMode: saved.timeMode === "12" ? "12" : "24"
          };
        } catch {
          return { timeMode: "24" };
        }
      }

      function saveState() {
        localStorage.setItem(stateKey, JSON.stringify({ timeMode }));
      }

      function buildSheet(targetLayer) {
        columns.forEach((column, index) => {
          const head = document.createElement("div");
          head.className = "col-head";
          head.style.gridColumn = String(index + 1);
          head.textContent = column;
          targetLayer.before(head);
        });

        for (let row = 1; row <= rowCount; row += 1) {
          columns.forEach((column, columnIndex) => {
            const cell = document.createElement("div");
            cell.className = "sheet-cell";
            cell.style.gridColumn = String(columnIndex + 1);
            cell.style.gridRow = String(row + 3);
            targetLayer.appendChild(cell);
          });
        }
      }

      function syncPageFromHash() {
        const showOptions = window.location.hash === "#options";
        mainScreen.hidden = showOptions;
        optionScreen.hidden = !showOptions;
        document.documentElement.classList.toggle("is-options-page", showOptions);
        lockPageScroll({ resetX: true });
      }

      function openOptionsPage() {
        if (window.location.hash !== "#options") {
          window.location.hash = "options";
          return;
        }
        syncPageFromHash();
      }

      function openMainPage() {
        history.pushState(null, "", `${window.location.pathname}${window.location.search}`);
        syncPageFromHash();
      }

      function setChatFocusMode(active) {
        document.documentElement.classList.toggle("is-chat-focused", active && chatPanel.classList.contains("is-open"));
      }

      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, "0");

        if (timeMode === "12") {
          hours = hours % 12 || 12;
        }

        clock.textContent = `${hours}:${minutes}`;
        timeModeToggle.textContent = timeMode === "24" ? "24시간" : "12시간";
        timeModeToggle.setAttribute("aria-pressed", String(timeMode === "12"));
      }

      function renderMessages() {
        messageFeed.innerHTML = "";
        messageFeed.classList.toggle("has-messages", messages.length > 0);
        chatPanel.classList.toggle("has-visible-messages", messages.length > 0);
        messages.forEach((message) => {
          const item = document.createElement("p");
          item.dataset.id = message.id;
          item.classList.toggle("is-fading", Boolean(message.isFading));
          item.textContent = `${message.name} ${message.text}`;
          messageFeed.appendChild(item);
        });
        scrollMessageFeedToBottom();
      }

      function scrollMessageFeedToBottom() {
        messageFeed.scrollTop = messageFeed.scrollHeight;
        requestAnimationFrame(() => {
          messageFeed.scrollTop = messageFeed.scrollHeight;
        });
      }

      function toggleChat() {
        if (chatPanel.classList.contains("is-open")) {
          closeChat();
          return;
        }
        openChat();
      }

      function openChat() {
        chatPanel.classList.add("is-open");
        chatOpenButton.textContent = "채팅 닫기";
        setChatFocusMode(true);
        lockPageScroll();
        focusChatInputNow();
        keepChatInputFocused();
      }

      function closeChat({ blurInput = true } = {}) {
        chatPanel.classList.remove("is-open");
        chatOpenButton.textContent = "채팅 말하기";
        setChatFocusMode(false);
        lockPageScroll();
        scrollMessageFeedToBottom();
        if (blurInput && document.activeElement === chatInput) {
          chatInput.blur();
        }
      }

      function sendMessage(text, { keepFocus = true } = {}) {
        const trimmed = text.trim();
        if (!trimmed) {
          return;
        }

        const message = {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: `익명${Math.floor(100 + Math.random() * 900)}`,
          text: trimmed
        };

        messages.push(message);
        chatInput.value = "";
        renderMessages();
        scheduleMessageRemoval(message.id);
        if (keepFocus) {
          keepChatOpenBriefly();
          keepChatInputFocused();
        }
      }

      function keepChatOpenBriefly() {
        keepChatOpenUntil = Date.now() + 650;
      }

      function focusChatInputNow() {
        try {
          chatInput.focus({ preventScroll: true });
        } catch {
          chatInput.focus();
        }
      }

      function keepChatInputFocused() {
        const screen = getActiveScreen();

        requestAnimationFrame(() => {
          focusChatInputNow();
          screen.scrollTop = 0;
          lockPageScroll();
          alignChatInputToViewport();
          requestAnimationFrame(() => {
            screen.scrollTop = 0;
            lockPageScroll();
            alignChatInputToViewport();
          });
        });
      }

      function alignChatInputToViewport() {
        if (!chatPanel.classList.contains("is-open")) {
          return;
        }

        const screen = document.querySelector(".screen");
        screen.scrollTop = 0;
        lockPageScroll();
      }

      function scrollToSheetTop() {
        lockPageScroll({ resetX: true });
      }

      function returnToTopAfterKeyboardClose() {
        scrollToSheetTop();
        requestAnimationFrame(scrollToSheetTop);
        setTimeout(scrollToSheetTop, 180);
        setTimeout(scrollToSheetTop, 360);
      }

      function scheduleMessageRemoval(id) {
        clearMessageTimers(id);
        const fadeTimer = setTimeout(() => {
          const message = messages.find((item) => item.id === id);
          if (!message) {
            return;
          }
          message.isFading = true;
          renderMessages();
        }, messageVisibleMs);

        const removeTimer = setTimeout(() => {
          removeMessage(id);
        }, messageVisibleMs + messageFadeMs);

        messageTimers.set(id, { fadeTimer, removeTimer });
      }

      function clearMessageTimers(id) {
        const timers = messageTimers.get(id);
        if (!timers) {
          return;
        }
        clearTimeout(timers.fadeTimer);
        clearTimeout(timers.removeTimer);
        messageTimers.delete(id);
      }

      function removeMessage(id) {
        clearMessageTimers(id);
        messages = messages.filter((message) => message.id !== id);
        renderMessages();
      }

      function showToast(text) {
        clearTimeout(toastTimer);
        toast.textContent = text;
        toast.hidden = false;
        toastTimer = setTimeout(() => {
          toast.hidden = true;
        }, 2200);
      }

      syncViewportHeight();
      buildSheet(cellLayer);
      buildSheet(optionCellLayer);
      renderMessages();
      updateClock();
      syncPageFromHash();

      optionToggle.addEventListener("click", () => {
        openOptionsPage();
      });

      backToMainButton.addEventListener("click", () => {
        openMainPage();
      });

      timeModeToggle.addEventListener("click", () => {
        timeMode = timeMode === "24" ? "12" : "24";
        updateClock();
        saveState();
      });

      sponsorButton.addEventListener("click", () => {
        showToast("후원하기 화면은 다음 단계에서 연결합니다.");
      });

      chatOpenButton.addEventListener("click", toggleChat);
      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage(chatInput.value);
      });

      function sendFromChatControl(event) {
        keepChatOpenBriefly();
        event.preventDefault();
        sendMessage(chatInput.value);
      }

      chatSendButton.addEventListener("pointerdown", sendFromChatControl);

      chatSendButton.addEventListener("touchstart", (event) => {
        if (!window.PointerEvent) {
          sendFromChatControl(event);
          return;
        }
        keepChatOpenBriefly();
      });

      chatSendButton.addEventListener("mousedown", (event) => {
        if (!window.PointerEvent) {
          sendFromChatControl(event);
        }
      });

      chatSendButton.addEventListener("click", (event) => {
        sendFromChatControl(event);
      });

      chatInput.addEventListener("focus", () => {
        setChatFocusMode(true);
        lockPageScroll();
        requestAnimationFrame(alignChatInputToViewport);
      });

      chatInput.addEventListener("blur", () => {
        setTimeout(() => {
          if (document.activeElement !== chatInput) {
            if (Date.now() < keepChatOpenUntil) {
              keepChatInputFocused();
              return;
            }
            closeChat({ blurInput: false });
            returnToTopAfterKeyboardClose();
          }
        }, 120);
      });

      chatInput.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") {
          return;
        }
        event.preventDefault();
        sendMessage(chatInput.value);
      });

      window.visualViewport?.addEventListener("resize", () => {
        syncViewportHeight();
        if (document.activeElement === chatInput) {
          setChatFocusMode(true);
          alignChatInputToViewport();
        }
      });

      window.addEventListener("resize", syncViewportHeight);
      window.addEventListener("scroll", lockPageScroll, { passive: true });
      mainScreen.addEventListener("scroll", lockPageScroll, { passive: true });
      optionScreen.addEventListener("scroll", lockPageScroll, { passive: true });
      window.addEventListener("hashchange", syncPageFromHash);

      setInterval(updateClock, 30 * 1000);
    </script>
  </body>
</html>
